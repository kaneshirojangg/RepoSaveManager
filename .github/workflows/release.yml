name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: RepoSaveManager-linux
            exe_name: Repo Save Manager
          - os: windows-latest
            asset_name: RepoSaveManager-windows
            exe_name: Repo Save Manager.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller RepoSaveManager.spec

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release/${{ matrix.asset_name }}
          cp -r dist/* release/${{ matrix.asset_name }}/
          cp RepoSaveManager.desktop release/${{ matrix.asset_name }}/
          cp install.sh uninstall.sh README.md release/${{ matrix.asset_name }}/
          tar -czf release/${{ matrix.asset_name }}.tar.gz -C release ${{ matrix.asset_name }}

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/${{ matrix.asset_name }} | Out-Null
          Copy-Item -Recurse -Force dist/* release/${{ matrix.asset_name }}/
          Copy-Item RepoSaveManager.desktop release/${{ matrix.asset_name }}/
          Copy-Item install.sh release/${{ matrix.asset_name }}/
          Copy-Item uninstall.sh release/${{ matrix.asset_name }}/
          Copy-Item README.md release/${{ matrix.asset_name }}/
          Compress-Archive -Path release/${{ matrix.asset_name }}/* -DestinationPath release/${{ matrix.asset_name }}.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}.tar.gz

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/RepoSaveManager-linux.tar.gz
            release-assets/**/RepoSaveManager-windows.zip
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
